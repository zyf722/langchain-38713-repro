name: langchain-38713-repro-matrix
 
on:
  workflow_dispatch:
  push:
 
permissions:
  contents: read
 
jobs:
  load-matrix:
    runs-on: ubuntu-latest
    outputs:
      pairs: ${{ steps.matrix.outputs.pairs }}
    steps:
      - uses: actions/checkout@v6
 
      - name: Read compatible version pairs
        id: matrix
        run: |
          set -euo pipefail
          pairs=$(jq -c '.pairs' version-pairs.json)
          echo "total pairs: $(echo "$pairs" | jq 'length')"
          echo "pairs=$pairs" >> "$GITHUB_OUTPUT"
 
  test:
    needs: load-matrix
    runs-on: ubuntu-latest
    name: test (core=${{ matrix.pair.core }}, lg=${{ matrix.pair.lg }})
    strategy:
      fail-fast: false
      matrix:
        pair: ${{ fromJSON(needs.load-matrix.outputs.pairs) }}
    steps:
      - uses: actions/checkout@v6
 
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
 
      - name: Install deps
        id: install
        run: |
          pip install --quiet --disable-pip-version-check \
            "langchain-core==${{ matrix.pair.core }}" \
            "langgraph==${{ matrix.pair.lg }}" \
            typing-extensions
 
      - name: Reproduce with summary
        run: |
          set +e
          python repro.py 2>&1 | tee test.out
          status=${PIPESTATUS[0]}
          set -e
 
          if [ "$status" -eq 0 ]; then
            result="Passed"
          else
            result="Error (exit $status)"
          fi
 
          {
            echo "### core=${{ matrix.pair.core }}, lg=${{ matrix.pair.lg }} ($result)"
            echo '```'
            cat test.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
 
          exit "$status"
